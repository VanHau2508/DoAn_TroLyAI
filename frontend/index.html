<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Trợ lý Sinh viên AI</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            color: #4F46E5;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #6B7280;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #111827;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4F46E5;
            color: white;
        }

        .btn-primary:hover {
            background: #4338CA;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #FEE2E2;
            color: #991B1B;
            border-left: 4px solid #EF4444;
        }

        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border-left: 4px solid #10B981;
        }

        .demo-info {
            margin-top: 20px;
            text-align: center;
            color: #6B7280;
            font-size: 14px;
            padding: 15px;
            background: #F9FAFB;
            border-radius: 10px;
        }

        .demo-info strong {
            color: #4F46E5;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <h1>🎓 Trợ lý Sinh viên AI</h1>
            <p>Đăng nhập để tiếp tục</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="nguyenvana@student.edu.vn"
                    value="nguyenvana@student.edu.vn"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Nhập mật khẩu"
                    value="123"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn">
                Đăng nhập
            </button>
        </form>

        <div class="demo-info">
            <p>
                📧 Demo Email: <strong>nguyenvana@student.edu.vn</strong><br>
                🔑 Mật khẩu: <strong>123</strong>
            </p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000';
        
        console.log('✅ Trang login đã load!');
        
        // Check if already logged in
        const currentUser = localStorage.getItem('student_user');
        if (currentUser) {
            console.log('✅ Đã đăng nhập, chuyển hướng...');
            window.location.href = 'dashboard.html';
        }

        function showAlert(message, type = 'error') {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${type} show`;
            alertDiv.textContent = message;
            
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        function setLoading(button, loading) {
            if (loading) {
                button.disabled = true;
                button.innerHTML = '<span class="loading"></span>Đang đăng nhập...';
            } else {
                button.disabled = false;
                button.innerHTML = 'Đăng nhập';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            console.log('🚀 Đang đăng nhập...');
            console.log('📧 Email:', email);
            
            setLoading(loginBtn, true);
            
            try {
                console.log('📡 Gửi request đến:', API_BASE_URL + '/api/students/login');
                
                const response = await fetch(API_BASE_URL + '/api/students/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        mat_khau: password
                    })
                });
                
                console.log('📡 Response status:', response.status);
                
                const data = await response.json();
                console.log('📦 Response data:', data);
                
                if (data.success) {
                    console.log('✅ Đăng nhập thành công!');
                    
                    // Save to localStorage
                    localStorage.setItem('student_user', JSON.stringify(data.data));
                    console.log('💾 Đã lưu user vào localStorage');
                    
                    showAlert('✅ Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    
                    setTimeout(() => {
                        console.log('🔄 Chuyển hướng đến dashboard...');
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    console.error('❌ Đăng nhập thất bại:', data.message);
                    showAlert('❌ ' + (data.message || 'Email hoặc mật khẩu không đúng!'));
                    setLoading(loginBtn, false);
                }
            } catch (error) {
                console.error('❌ Lỗi kết nối:', error);
                showAlert('❌ Lỗi kết nối đến server! Kiểm tra:\n1. Flask server đang chạy?\n2. URL: http://localhost:5000');
                setLoading(loginBtn, false);
            }
        });
    </script>
</body>
</html>
